<!DOCTYPE html>
<html>
<head>
<title>Home</title>

<style>
body {background:#0f172a;color:white;text-align:center;font-family:Arial;}
.box {background:#1e293b;padding:20px;border-radius:10px;margin-top:50px;display:inline-block;}
button{padding:10px;border:none;background:#22c55e;color:white;border-radius:5px;}
</style>

</head>
<body>

<div class="box">
<h2 id="welcome"></h2>

<button onclick="logout()">Logout</button>
</div>

<script>
const email = localStorage.getItem("email");
document.getElementById("welcome").innerText = "Welcome " + email;

function logout() {
  localStorage.clear();
  window.location = "/";  // ✅ FIXED
}
</script>

</body>
</html>
